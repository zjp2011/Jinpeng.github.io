      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    header {

      margin-bottom: 50px;
    }
    h1 {

    }
    .avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;

      border: 5px solid #1a73e8;
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.2);
      margin: 30px auto;
      display: block;
    }

      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 10px;
      margin-top: 0;
    }
    .info p {
      font-size: 1.1em;
      margin: 12px 0;
    }
    .social a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
      margin: 0 10px;
    }
    .social a:hover {
      text-decoration: underline;
    }
    footer {
      text-align: center;
      color: #777;
      margin-top: 60px;
      font-size: 0.95em;
    }

    /* 响应式：手机端优化 */
    @media (max-width: 600px) {
      .container { padding: 40px 15px; }
      h1 { font-size: 2.2em; }
      .avatar { width: 140px; height: 140px; }
    }
